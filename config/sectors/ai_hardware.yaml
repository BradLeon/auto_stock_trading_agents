# AI 硬件行业 — L1-L6 分层定义（sector_analyst 每周评审的宇宙）。
# Seed 自「半导体产业研究合集/AI半导体产业链分析上篇-供应链全貌概览」，需求沿 L1→L6 传导。
# ⚠️ 分层归属请用户校正（标 TODO 的尤其）；本文件是唯一真源，层 key 会被 LLM 逐字回显。

name: ai_hardware
label: AI硬件
sector_etf: SMH
benchmark: QQQ
output_dir: /Users/liuchao/Documents/Obsidian Vault/量化投资/个股分析系统

layers:
  - key: L1_app
    label: L1 AI应用层（Token经济）
    weight_cap: 0.15        # 风控：本产业链层持仓总权重上限
    question: 谁在消耗算力？Token 需求是否仍在加速？
    tickers:
      - {symbol: GOOGL, note: Gemini（兼属L2）}
    private: [OpenAI, Anthropic, xAI]        # 无票据，供 LLM 参考需求侧

  - key: L2_cloud
    label: L2 云服务层（算力租用）
    weight_cap: 0.25        # 低 beta 超大厂
    question: 算力租金/利用率如何？Capex 指引是否继续上修？
    tickers:
      - {symbol: MSFT}
      - {symbol: AMZN}
      - {symbol: META, note: 自用为主，近期传出售闲置算力}
      - {symbol: GOOGL}
      - {symbol: GOOG, note: Alphabet C类（IBKR/用户实际持有此代码）}
      - {symbol: CRWV, note: neocloud，TODO 用户确认}

  - key: L3_dc_infra
    label: L3 数据中心基建（电力/冷却/网络/光互联）
    weight_cap: 0.14        # 工作上限（光互联 PEAD 核心，高 beta）
    weight_cap_hard: 0.2   # 动态 cap 硬顶：signal 再强也不越过
    question: 机房/电力/光互联哪个环节仍是瓶颈？订单能见度多长？
    # 子层：光互联(收发/光引擎) · 铜连接(AEC/DSP) · 上游衬底 · 电力冷却
    tickers:
      - {symbol: COHR, subgroup: 光互联, note: 1.6T/InP 衬底自供}
      - {symbol: LITE, subgroup: 光互联, note: 收发+激光器}
      - {symbol: AAOI, subgroup: 光互联, note: 收发，含CATV，小盘高波}
      - {symbol: CRDO, subgroup: 铜连接, note: Credo AEC有源电缆+DSP/retimer，超高增速/贵}
      - {symbol: AXT,  subgroup: 衬底,   note: 化合物半导体衬底 InP/GaAs，小盘/中国敞口}
      - {symbol: VRT,  subgroup: 电力冷却, note: Vertiv 电力/热管理/液冷，大盘动量}
    # 截面同业（风控主层在别处：MRVL 风控=L4，此处仅作 L3 光/电 DSP 同业参与排序）
    cohort_extra: [MRVL]

  - key: L4_chip_design
    label: L4 芯片设计
    weight_cap: 0.15
    question: 加速卡供需与 ASIC 替代节奏？
    tickers:
      - {symbol: NVDA}
      - {symbol: AMD}
      - {symbol: AVGO, note: ASIC/网络}
      - {symbol: MRVL, note: Marvell 定制ASIC+光DSP（横跨L3光互联，按合集归L4设计服务）}

  - key: L5_fab
    label: L5 芯片制造（Foundry+封装+存储）
    weight_cap: 0.25
    question: CoWoS/HBM 产能缺口与涨价周期位置？
    tickers:
      - {symbol: TSM, note: 先进制程+CoWoS}
      - {symbol: MU, note: HBM}
      - {symbol: HY9H, note: SK海力士/HBM龙头（IBKR法兰克福ADR代码，用户实际持有）}
      - {symbol: SKHY, note: SK海力士 美国ADR（用户同时持有此代码）}
      - {symbol: "000660.KS", note: SK海力士 韩股（参考）}
      - {symbol: "005930.KS", note: 三星/HBM追赶}

  - key: L6_equipment
    label: L6 半导体设备
    weight_cap: 0.09        # 高 beta / 强周期
    question: 设备订单（WFE）领先指标指向扩产还是收缩？
    tickers:
      - {symbol: ASML, note: EUV 最不可替代}
      - {symbol: AMAT}
      - {symbol: LRCX}
      - {symbol: KLAC, note: KLA Corp（正确代码 KLAC，原 KLA 错误）}
      - {symbol: LSRCY, note: Lasertec ADR（EUV 掩模检测设备）}
      - {symbol: "8035.T", note: TEL，TODO 用户确认}

# 每票轻量快照的抓取策略（限速关键）
snapshot:
  momentum_days: [20, 60]
  consensus_for: pead_targets       # pead_targets | all | none
  sleep_between_tickers: 0.8        # get_info 间隔秒数

# 评审上下文的规模控制
review:
  static_notes_chars: 36000         # 静态合集喂给合成的总上限
  insights_per_ticker: 3
  events_lookback_days: 14
  events_min_triage: 0.6
  dossier_excerpt_chars: 350
