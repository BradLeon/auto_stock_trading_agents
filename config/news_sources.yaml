# News sources for the continuous PEAD monitor.

# Curated RSS feeds (industry newsletters / research). Items are matched to a
# ticker by keyword (see keywords_by_ticker) since RSS has no ticker field.
rss:
  - name: SemiAnalysis
    url: https://www.semianalysis.com/feed
  - name: SECEdgar8K-Coherent      # example company-specific feed (optional)
    url: https://www.coherent.com/rss   # placeholder; replace with a real feed

# X / social accounts to track (X API is restricted — adapter is a stub for now).
x_accounts:
  - elonmusk
  - karpathy
  - realDonaldTrump

# Keyword filters to associate RSS/social items with a PEAD target.
keywords_by_ticker:
  COHR: [coherent, "1.6T", "1.6t", transceiver, "indium phosphide", InP, optical, datacom, OCS, CPO]
  LITE: [lumentum, transceiver, laser, optical, datacom, EML]
  AAOI: ["applied optoelectronics", optical, transceiver, datacom]
