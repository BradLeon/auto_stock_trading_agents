# Application configuration (non-secret). Secrets live in .env.
# Loaded by src/ats/config.py.

environment: live           # paper | live  (switch here when going live)

# --- LLM routing -------------------------------------------------------------
# provider: anthropic (native ChatAnthropic) | openai (OpenAI-compatible via base_url)
llm:
  # OpenRouter relay (OpenAI-compatible) — swap provider/model by editing here.
  default_provider: openai
  default_model: anthropic/claude-opus-4.8
  temperature: 0.2
  max_tokens: 4096
  timeout_seconds: 120
  max_retries: 3
  # Per-role overrides. Omit a role to use the defaults above.
  routing:
    macro_analyst: {}
    industry_analyst: {}
    fundamental_analyst: {}
    technical_analyst: {}
    risk_manager: {}
    manager: {}            # daily portfolio decisions — real money, keep Opus
    # --- cheap tier (Gemini Flash): high-volume or extraction-only, no quality loss ---
    news_triage: {model: google/gemini-2.5-flash, temperature: 0.0, max_tokens: 8192}
    context_monitor: {model: google/gemini-2.5-flash, max_tokens: 4096}   # PEAD monitor _llm_update (high-frequency; triage pre-filters)
    actuals_extract: {model: google/gemini-2.5-flash, max_tokens: 4096}   # pull reported numbers from transcript/8-K (factual)
    # --- Opus tier: genuine judgment that drives trades, low frequency ---
    research_extract: {}   # second-order supply-chain reasoning is the whole value
    sector_analyst: {max_tokens: 8192}   # weekly L1-L6 sector review — large structured output
    macro_strategist: {max_tokens: 8192} # weekly macro regime + sector tilts — large structured output
    chief: {max_tokens: 8192}            # 首席收口 — daily portfolio decision synthesis, Opus
    # prep narrative/expectations + pead-scorer stay on the default `manager` (Opus).

# --- Risk guardrail defaults (6-layer hard limits; validator only tightens) --
risk:
  # L1 标的
  max_position_pct: 0.20        # single name <= 20% of net liquidation
  max_sector_pct: 0.50          # GICS-sector backstop for non-universe holdings
  stop_loss_pct: 0.25           # per-position unrealized loss vs cost -> forced trim
  # L2 组合
  max_gross_leverage: 1.0       # no margin in paper phase
  max_single_order_usd: 25000
  cash_floor_pct: 0.05          # keep >= 5% cash
  # L3 市场/因子
  beta_cap: 1.5                 # portfolio weighted beta ceiling
  cluster_corr_threshold: 0.7   # pairwise corr to join a correlated cluster
  cluster_weight_cap: 0.75      # single cluster ceiling (intentional AI concentration)
  # L4 亏损/回撤
  max_drawdown_pct: 0.15        # peak-to-trough NetLiq -> de-risk mode (block new buys)
  daily_loss_limit_pct: 0.05    # single-day loss -> stop new buys
  # L5 尾部/压测
  max_stress_loss_pct: 0.25     # worst scenario loss vs NAV
  stress_market_shocks: [-0.10, -0.20]
  ai_bubble_cluster_shock: -0.35  # extra shock on the top correlated cluster
  # L6 事件
  max_event_loss_pct: 0.03      # single earnings gap: weight * expected_move <= this
  max_pct_adv: 0.10             # liquidity (report only)

# --- IBKR broker connection --------------------------------------------------
# Port: TWS live=7496, TWS paper=7497, IB Gateway live=4001, IB Gateway paper=4002
# client_id: use different IDs for paper vs live to avoid conflicts
broker:
  port: 7496        # live TWS
  client_id: 12     # live client id

# --- Account (sizing) --------------------------------------------------------
account:
  net_liquidation_usd: 100000   # paper book size until IBKR provides the live value

# --- Boss approval channel ---------------------------------------------------
channel:
  kind: cli                     # cli (Phase 1) | feishu | discord (Phase 2)

# --- Scheduling (Phase 9) ----------------------------------------------------
schedule:
  enabled: false
  run_at: "16:15"               # after US close, local exchange tz
  timezone: America/New_York
