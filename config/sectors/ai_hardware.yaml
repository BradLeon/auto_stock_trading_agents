# 每票轻量快照的抓取策略（限速关键）
snapshot:
  momentum_days: [20, 60]
  consensus_for: pead_targets       # pead_targets | all | none
  sleep_between_tickers: 0.8        # get_info 间隔秒数

# 评审上下文的规模控制
review:
  static_notes_chars: 36000         # 静态合集喂给合成的总上限
  insights_per_ticker: 3
  events_lookback_days: 14
  events_min_triage: 0.6
  dossier_excerpt_chars: 350
